<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട് തയ്യാറാക്കൽ</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        /* നോട്ട് പേപ്പറിന്റെ ഡിസൈൻ */
        .notebook-page {
            background-color: white;
            width: 210mm; /* A4 Size */
            min-height: 297mm;
            padding: 50px 40px 40px 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            position: relative;
            border-right: 3px solid #ff4d4d; /* വലതുവശത്തെ ചുവന്ന മാർജിൻ */
            box-sizing: border-box;
        }
        /* നോട്ട്ബുക്കിലെ വരികൾ */
        .content-area {
            line-height: 2.5;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 2.5em;
            outline: none;
            min-height: 900px;
            font-size: 19pt;
            text-align: right;
            padding-right: 15px;
            color: #333;
        }
        .header-section {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        .controls {
            margin-bottom: 20px;
            background: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 12px 25px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* പ്രിന്റ് എടുക്കുമ്പോൾ ആവശ്യമില്ലാത്തവ ഒഴിവാക്കാൻ */
        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { 
                box-shadow: none; 
                width: 100%; 
                margin: 0;
                border-right: 3px solid #ff4d4d;
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">നോട്ട് പ്രിന്റ് എടുക്കുക / PDF ആക്കുക</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <h2 contenteditable="true">പാഠം: ........................................</h2>
            <p contenteditable="true">തിയ്യതി: .... / .... / 2026</p>
        </div>

        <div class="content-area" contenteditable="true">
            ഇവിടെ അറബി മലയാളം ടൈപ്പ് ചെയ്തു തുടങ്ങാം...
        </div>
    </div>

</body>
</html>
