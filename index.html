<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്ബുക്ക്</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .notebook-page {
            background-color: white;
            width: 100%;
            max-width: 210mm;
            min-height: 297mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .top-blue-line {
            width: 100%;
            height: 2px;
            background-color: #007bff;
            position: absolute;
            top: 120px;
            z-index: 1;
        }

        .margin-line {
            position: absolute;
            top: 0;
            right: 80px;
            bottom: 0;
            width: 2px;
            background-color: #ff4d4d;
            z-index: 2;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 20px 10px 100px;
            z-index: 5;
            min-height: 80px;
        }

        /* ഹെഡിംഗിൽ ചിത്രം വരാൻ */
        .lesson-area {
            font-size: 22pt;
            flex-grow: 1;
            text-align: right;
            outline: none;
            font-family: 'Amiri', serif;
        }

        .date-area {
            font-size: 16pt;
            text-align: left;
            min-width: 150px;
            outline: none;
        }

        .typing-container {
            display: flex;
            flex-grow: 1;
            z-index: 5;
            margin-top: 25px;
        }

        .number-margin {
            width: 80px;
            text-align: center;
            font-size: 20pt;
            outline: none;
            color: #555;
        }

        .main-content {
            flex-grow: 1;
            padding: 0 15px 0 20px;
            font-size: 24pt;
            line-height: 2;
            text-align: right;
            outline: none;
            font-family: 'Amiri', serif;
            min-height: 800px;
        }

        /* പ്ലേസ്‌ഹോൾഡർ സെറ്റിംഗ്‌സ് */
        [contenteditable=true]:empty:before {
            content: attr(data-placeholder);
            color: #ccc;
            font-family: sans-serif;
            font-size: 16pt;
        }

        img {
            max-width: 250px; /* ഹെഡിംഗിൽ ചിത്രം വരുമ്പോൾ വല്ലാതെ വലുതാകാതിരിക്കാൻ */
            height: auto;
            display: block;
            margin: 10px 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-image { background-color: #007bff; }
        .btn-print { background-color: #28a745; }

        @media print {
            .controls { display: none; }
            body { background: white; }
            .notebook-page { width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="insertImage(event)">
        <button class="btn btn-image" onclick="document.getElementById('imageInput').click()">📷 ചിത്രം ചേർക്കുക</button>
        <button class="btn btn-print" onclick="window.print()">പ്രിന്റ് / PDF</button>
    </div>
    <div class="notebook-page">
        <div class="margin-line"></div>
        <div class="top-blue-line"></div>

        <div class="header-section">
            <div class="lesson-area" id="header-area" contenteditable="true" data-placeholder="പാഠം എഴുതുകയോ ചിത്രം ചേർക്കുകയോ ചെയ്യാം..."></div>
            <div class="date-area" contenteditable="true">തിയ്യതി: ..../..../2026</div>
        </div>

        <div class="typing-container">
            <div class="number-margin" contenteditable="true">1.</div>
            <div class="main-content" id="main-editor" contenteditable="true" data-placeholder="ഇവിടെ എഴുതി തുടങ്ങാം..."></div>
        </div>
    </div>

    <script>
        let lastFocusedEditor = document.getElementById('main-editor');

        // ഏത് ഭാഗത്താണോ അവസാനം ക്ലിക്ക് ചെയ്തത് അവിടെ ചിത്രം വരാൻ
        document.getElementById('header-area').addEventListener('focus', function() {
            lastFocusedEditor = this;
        });
        document.getElementById('main-editor').addEventListener('focus', function() {
            lastFocusedEditor = this;
        });

        function insertImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                lastFocusedEditor.appendChild(img);
                lastFocusedEditor.appendChild(document.createElement('br'));
            }
            if (event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }
    </script>

</body>
</html>
