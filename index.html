<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്ബുക്ക്</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .notebook-page {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            padding: 50px 0 40px 0; /* വശങ്ങളിലെ പാഡിംഗ് ഒഴിവാക്കി */
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }
        /* നോട്ട്ബുക്കിലെ വരകൾ */
        .lines-container {
            line-height: 2.5em;
            background-image: linear-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 100% 2.5em;
            margin-top: 20px;
            min-height: 900px;
            position: relative;
        }
        /* വലതുവശത്തെ മാർജിൻ വരി (Vertical Red Line) */
        .lines-container::before {
            content: '';
            position: absolute;
            top: 0;
            right: 60px; /* മാർജിൻ കോളം വീതി */
            bottom: 0;
            width: 2px;
            background-color: #ff4d4d;
            z-index: 2;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            margin-bottom: 10px;
        }
        .lesson-title {
            font-size: 22pt;
            text-align: right;
            flex-grow: 1;
            outline: none;
        }
        .date-section {
            font-size: 16pt;
            text-align: left;
            min-width: 150px;
            outline: none;
        }
        /* എഴുതുന്ന ഭാഗം */
        .content-area {
            display: flex;
            width: 100%;
            outline: none;
        }
        /* നമ്പറുകൾ ഇടാനുള്ള കോളം (Margin Column) */
        .margin-numbers {
            width: 60px;
            text-align: center;
            font-size: 18pt;
            color: #888;
            pointer-events: none; /* ഇതിൽ ടൈപ്പ് ചെയ്യണ്ട */
        }
        /* പ്രധാന എഴുത്ത് ഭാഗം */
        .main-text {
            flex-grow: 1;
            padding-right: 15px;
            padding-left: 40px;
            font-size: 20pt;
            text-align: right;
            color: #222;
            outline: none;
            min-height: 900px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">പ്രിന്റ് എടുക്കുക / PDF ആക്കുക</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <div class="lesson-title" contenteditable="true">........................................</div>
            <div class="date-section" contenteditable="true">തിയ്യതി: .... / .... / 2026</div>
        </div>

        <div class="lines-container">
            <div class="content-area">
                <div class="main-text" contenteditable="true">
                    ഇവിടെ എഴുതി തുടങ്ങാം...
                </div>
                <div class="margin-numbers">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
