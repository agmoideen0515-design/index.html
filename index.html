<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്ബുക്ക്</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .notebook-page {
            background-color: white;
            width: 100%;
            max-width: 210mm;
            min-height: 297mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            padding-top: 20px; /* മുകളിലെ മാർജിൻ */
            display: flex;
            flex-direction: column;
        }

        /* മുകളിലെ നീല വര (Top Blue Header Line) */
        .top-blue-line {
            width: 100%;
            height: 2px;
            background-color: #007bff;
            margin-top: 20px;
            position: absolute;
            top: 100px; /* ഹെഡറിന് താഴെ കൃത്യമായി വരാൻ */
            z-index: 1;
        }

        /* വലതുവശത്തെ ചുവന്ന മാർജിൻ ലൈൻ */
        .margin-line {
            position: absolute;
            top: 0;
            right: 80px;
            bottom: 0;
            width: 2px;
            background-color: #ff4d4d;
            z-index: 2;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 10px 100px;
            margin-bottom: 30px; /* വരികൾക്കിടയിലുള്ള അകലം */
            z-index: 5;
        }

        .lesson-area {
            font-size: 22pt;
            flex-grow: 1;
            text-align: right;
            outline: none;
            font-family: 'Amiri', serif;
        }

        .date-area {
            font-size: 16pt;
            text-align: left;
            min-width: 150px;
            outline: none;
        }

        /* ടൈപ്പിംഗ് ഏരിയ */
        .typing-container {
            display: flex;
            flex-grow: 1;
            z-index: 5;
            margin-top: 15px;
        }

        /* നമ്പറുകൾക്കുള്ള സ്ഥലം (ചുവന്ന വരയ്ക്ക് വലതുവശത്ത്) */
        .number-margin {
            width: 80px;
            text-align: center;
            font-size: 20pt;
            outline: none;
            color: #555;
            padding-top: 5px;
        }

        /* പ്രധാന എഴുത്ത് ഭാഗം */
        .main-content {
            flex-grow: 1;
            padding-right: 15px;
            padding-left: 20px;
            font-size: 24pt;
            line-height: 2.2;
            text-align: right;
            outline: none;
            font-family: 'Amiri', serif;
            min-height: 800px;
        }

        .main-content:empty:before {
            content: "ഇവിടെ പാഠം എഴുതി തുടങ്ങാം...";
            color: #ccc;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
        }

        button {
            padding: 12px 25px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        @media print {
            .controls { display: none; }
            body { background: white; }
            .notebook-page { width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">പ്രിന്റ് / PDF</button>
    </div>

    <div class="notebook-page">
        <div class="margin-line"></div>
        
        <div class="top-blue-line"></div>

        <div class="header-section">
            <div class="lesson-area" contenteditable="true">പാഠം: ................................</div>
            <div class="date-area" contenteditable="true">തിയ്യതി: ..../..../2026</div>
        </div>
        <div class="typing-container">
            <div class="number-margin" contenteditable="true">1.</div>
            
            <div class="main-content" contenteditable="true"></div>
        </div>
    </div>

</body>
</html>
