<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്ബുക്ക്</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .notebook-page {
            background-color: white;
            width: 100%;
            max-width: 210mm; /* A4 Size */
            min-height: 297mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            padding: 40px 10px 40px 10px;
            display: flex;
            flex-direction: column;
        }

        /* വലതുവശത്തെ ചുവന്ന മാർജിൻ ലൈൻ */
        .margin-line {
            position: absolute;
            top: 0;
            right: 80px; /* മാർജിൻ കോളത്തിന്റെ വീതി */
            bottom: 0;
            width: 2px;
            background-color: #ff4d4d;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 20px;
            margin-bottom: 40px;
            padding: 0 10px 0 90px; /* മാർജിൻ ഒഴിവാക്കി */
            z-index: 5;
        }

        .lesson-area {
            font-size: 22pt;
            flex-grow: 1;
            text-align: right;
            outline: none;
            font-family: 'Amiri', serif;
            border-bottom: 1px solid #eee;
        }

        .date-area {
            font-size: 14pt;
            text-align: left;
            min-width: 150px;
            outline: none;
        }

        /* ടൈപ്പിംഗ് ഏരിയ - രണ്ട് ഭാഗങ്ങളായി തിരിച്ചു */
        .typing-container {
            display: flex;
            flex-grow: 1;
            z-index: 5;
        }

        /* നമ്പറുകൾ എഴുതാനുള്ള മാർജിൻ ഭാഗം */
        .number-margin {
            width: 80px;
            min-height: 800px;
            text-align: center;
            font-size: 20pt;
            outline: none;
            color: #555;
            padding-top: 5px;
        }

        /* പ്രധാന എഴുത്ത് ഭാഗം */
        .main-content {
            flex-grow: 1;
            min-height: 800px;
            font-size: 24pt;
            line-height: 2;
            text-align: right;
            outline: none;
            font-family: 'Amiri', serif;
            padding-right: 15px;
            padding-left: 10px;
        }

        .main-content:empty:before {
            content: "ഇവിടെ പാഠം എഴുതാം...";
            color: #ccc;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }

        button {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        @media print {
            .controls { display: none; }
            body { background: white; }
            .notebook-page { width: 100%; box-shadow: none; max-width: none; }
            .margin-line { right: 80px !important; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">Print / PDF</button>
    </div>

    <div class="notebook-page">
        <div class="margin-line"></div>

        <div class="header-section">
            <div class="lesson-area" contenteditable="true">പാഠം: ................................</div>
            <div class="date-area" contenteditable="true">തിയ്യതി: ..../..../2026</div>
        </div>

        <div class="typing-container">
            <div class="number-margin" contenteditable="true">1.</div>
            
            <div class="main-content" contenteditable="true"></div>
        </div>
    </div>

</body>
</html>
