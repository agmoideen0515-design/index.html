<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .notebook-page {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            padding: 60px 50px 40px 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            position: relative;
            /* വലതുവശത്തെ ചുവന്ന മാർജിൻ */
            border-right: 4px solid #ff4d4d; 
            box-sizing: border-box;
        }
        .content-area {
            line-height: 2.5;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 2.5em;
            outline: none;
            min-height: 900px;
            font-size: 20pt;
            text-align: right;
            padding-right: 20px;
            color: #222;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        .lesson-title {
            flex-grow: 1;
            font-size: 22pt;
            text-align: right;
            min-width: 100px;
        }
        .date-section {
            font-size: 16pt;
            text-align: left;
            min-width: 200px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { 
                box-shadow: none; 
                border-right: 4px solid #ff4d4d; 
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">പ്രിന്റ് എടുക്കുക / PDF ആക്കുക</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <div class="lesson-title" contenteditable="true">........................................</div>
            <div class="date-section" contenteditable="true">തിയ്യതി: .... / .... / 2026</div>
        </div>

        <div class="content-area" contenteditable="true">
            ഇവിടെ അറബി മലയാളം ടൈപ്പ് ചെയ്യുക...
        </div>
    </div>

</body>
</html>
