<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട് തയ്യാറാക്കൽ</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        /* നോട്ട് പേപ്പറിന്റെ ഡിസൈൻ */
        .notebook-page {
            background-color: white;
            width: 210mm; /* A4 Size */
            min-height: 297mm;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            border-right: 2px solid #ff4d4d; /* വലതുവശത്തെ മാർജിൻ */
            box-sizing: border-box;
        }
        /* വരികൾ കാണിക്കാൻ */
        .content-area {
            line-height: 2.5;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 2.5em;
            outline: none;
            min-height: 800px;
            font-size: 18pt;
            text-align: right;
            padding-right: 20px;
        }
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .controls {
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        /* പ്രിന്റ് എടുക്കുമ്പോൾ ബട്ടണുകൾ കാണാതിരിക്കാൻ */
        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { box-shadow: none; border-right: 2px solid #ff4d4d; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <strong>ഇവിടെ ടൈപ്പ് ചെയ്യുക -> </strong>
        <button onclick="window.print()">പ്രിന്റ് എടുക്കുക (PDF ആക്കുക)</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <h2 contenteditable="true">പാഠം: ഇവിടെ തലക്കെട്ട് നൽകുക</h2>
            <p contenteditable="true">തിയ്യതി: __/__/____</p>
        </div>

        <div class="content-area" contenteditable="true">
            ഇവിടെ അറബി മലയാളം ടൈപ്പ് ചെയ്യുക...
        </div>
    </div>

</body>
</html>
